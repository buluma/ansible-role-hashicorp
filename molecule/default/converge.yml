---
- name: Converge
  hosts: all
  become: true
  gather_facts: true
  roles:
    - hashicorp_products:
        - name: consul
          version: 1.11.3
      role: buluma.hashicorp
    - hashicorp_installation_method: manual
      hashicorp_products:
        - name: vault
          type: ent
          version: 1.9.0
      role: buluma.hashicorp
